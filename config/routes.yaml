# config/routes.yaml

# 1. Handle the "root" (domain.com/) by sending it to domain.com/fr

root_redirect:
    path: /
    controller: App\Controller\LocaleLanguageController::detect

# 2. Automatically prefix ALL controllers with /{_locale}
app_localized:
    resource: ../src/Controller/
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: en|fr
    defaults:
        _locale: fr


